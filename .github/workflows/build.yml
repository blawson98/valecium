name: Nightly Build and Deploy

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DOCKER_IMAGE_REPOSITORY: vincent4486/valeciumos-builder
      DOCKER_IMAGE_TAG: i686
      CONTAINER_WORKDIR: /build
      BUILD_ARCH: i686
      BUILD_CONFIG: debug
      BUILD_TYPE: image
      KERNEL_ARTIFACT_PATTERN: valeciumx-*
      ISO_ARTIFACT_PATTERN: valeciumos-*.iso
      ARTIFACT_STAGE_DIR: artifact
      TARBALL_PREFIX: valecium-nightly
      TIMESTAMP_FORMAT: +%Y%m%d%H%M%S
      REMOTE_KEEP_COUNT: 10
      SSH_KEY_FILENAME: id_rsa
      REMOTE_USER: ${{ secrets.REMOTE_USER }}
      REMOTE_IP: ${{ secrets.REMOTE_IP }}
      REMOTE_PRIVATE_KEY: ${{ secrets.REMOTE_PRIVATE_KEY }}
      REMOTE_PATH: /var/webdownloads/valecium/nightly

    steps:
      - name: 01 - Checkout repository
        uses: actions/checkout@v4

      - name: 02 - Resolve build metadata
        run: |
          set -euo pipefail

          short_hash=$(git rev-parse --short=7 HEAD 2>/dev/null || echo "unknown")
          date_tag=$(date -u "$TIMESTAMP_FORMAT")

          echo "SHORT_HASH=$short_hash" >> "$GITHUB_ENV"
          echo "DATE_TAG=$date_tag" >> "$GITHUB_ENV"

      - name: 03 - Pull builder container image
        run: |
          set -euo pipefail
          docker pull "$DOCKER_IMAGE_REPOSITORY:$DOCKER_IMAGE_TAG"

      - name: 04 - Build ISO
        run: |
          set -euo pipefail

          echo "Building ISO"

          docker run --rm \
            -v "$GITHUB_WORKSPACE:$CONTAINER_WORKDIR" \
            -w "$CONTAINER_WORKDIR" \
            -e BUILD_ARCH \
            -e BUILD_CONFIG \
            -e BUILD_TYPE \
            -e SHORT_HASH \
            "$DOCKER_IMAGE_REPOSITORY:$DOCKER_IMAGE_TAG" \
            bash -c '
              set -euo pipefail
              scons -Q \
                BuildArch="$BUILD_ARCH" \
                BuildConfig="$BUILD_CONFIG" \
                BuildType="$BUILD_TYPE" \
                ProjVersion="$SHORT_HASH"
            '

      - name: 05 - Gather build artifacts
        run: |
          set -euo pipefail

          kernel_file=$(find build -type f -name "$KERNEL_ARTIFACT_PATTERN" | sort | head -n 1)
          iso_file=$(find build -type f -name "$ISO_ARTIFACT_PATTERN" | sort | head -n 1)

          if [ -z "$kernel_file" ] || [ -z "$iso_file" ]; then
            echo "ERROR: artifacts not found"
            echo "KERNEL_ARTIFACT_PATTERN=$KERNEL_ARTIFACT_PATTERN"
            echo "ISO_ARTIFACT_PATTERN=$ISO_ARTIFACT_PATTERN"
            exit 1
          fi

          mkdir -p "$ARTIFACT_STAGE_DIR"
          cp -- "$kernel_file" "$iso_file" "$ARTIFACT_STAGE_DIR/"

      - name: 06 - Create nightly tarball
        run: |
          set -euo pipefail

          tarball="${TARBALL_PREFIX}-${DATE_TAG}-${SHORT_HASH}.tar.xz"
          tar -cJf "$tarball" -C "$ARTIFACT_STAGE_DIR" .
          echo "TARBALL_NAME=$tarball" >> "$GITHUB_ENV"

      - name: 07 - Deploy tarball to remote server
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "$REMOTE_PRIVATE_KEY" > "$HOME/.ssh/$SSH_KEY_FILENAME"
          chmod 600 "$HOME/.ssh/$SSH_KEY_FILENAME"
          ssh-keyscan -H "$REMOTE_IP" >> ~/.ssh/known_hosts

          ssh -o StrictHostKeyChecking=no "$REMOTE_USER@$REMOTE_IP" "mkdir -p '$REMOTE_PATH'"

          scp -o StrictHostKeyChecking=no "$TARBALL_NAME" "$REMOTE_USER@$REMOTE_IP:$REMOTE_PATH/"

      - name: 08 - Prune old remote nightly tarballs
        run: |
          set -euo pipefail

          ssh -o StrictHostKeyChecking=no "$REMOTE_USER@$REMOTE_IP" \
            "REMOTE_PATH='$REMOTE_PATH' REMOTE_KEEP_COUNT='$REMOTE_KEEP_COUNT' bash -se" <<'EOF'
          set -euo pipefail
          mkdir -p "$REMOTE_PATH"
          cd "$REMOTE_PATH"
          ls -1t *.tar.xz 2>/dev/null | tail -n "+$((REMOTE_KEEP_COUNT + 1))" | xargs -r rm --
          EOF